name: Build JhopanStoreVPN

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_windows:
        description: "Build Windows"
        type: boolean
        default: true
      build_linux:
        description: "Build Linux"
        type: boolean
        default: true
      build_macos:
        description: "Build macOS"
        type: boolean
        default: true
      build_android:
        description: "Build Android APK"
        type: boolean
        default: true

jobs:
  # Deteksi file apa yang berubah sejak commit/tag sebelumnya
  changes:
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tentukan base ref untuk perbandingan
        id: base
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tag push: bandingkan terhadap tag sebelumnya
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
            if [ -z "$PREV_TAG" ]; then
              echo "base=HEAD~1" >> $GITHUB_OUTPUT
            else
              echo "base=$PREV_TAG" >> $GITHUB_OUTPUT
            fi
          else
            echo "base=HEAD~1" >> $GITHUB_OUTPUT
          fi

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.base.outputs.base }}
          filters: |
            desktop:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'assets/**'
              - '.github/workflows/build.yml'
            android:
              - 'android/**'
              - '.github/workflows/build.yml'

  build-windows:
    needs: changes
    # Tag push → selalu build semua platform | manual → checkbox | branch push → path filter
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_windows == true) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.desktop == 'true')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download Xray-core
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-windows-64.zip" -OutFile xray.zip
          Expand-Archive xray.zip -DestinationPath xray-tmp -Force
          $xrayExe = Get-ChildItem -Recurse xray-tmp -Filter "xray.exe" | Select-Object -First 1
          Copy-Item $xrayExe.FullName ./xray.exe

      - name: Download tun2socks binary
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/xjasonlyu/tun2socks/releases/download/v2.5.2/tun2socks-windows-amd64.zip" -OutFile tun2socks.zip
          Expand-Archive tun2socks.zip -DestinationPath tun2socks-tmp -Force
          New-Item -ItemType Directory -Force -Path bin
          Copy-Item tun2socks-tmp/tun2socks-windows-amd64.exe bin/tun2socks.exe

      - name: Generate Windows manifest and version info
        shell: pwsh
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          goversioninfo -64

      - name: Build
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "1"
          go build -v -ldflags="-s -w -H windowsgui" -o JhopanStoreVPN.exe .

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/JhopanStoreVPN-windows
          Copy-Item JhopanStoreVPN.exe release/JhopanStoreVPN-windows/
          Copy-Item xray.exe release/JhopanStoreVPN-windows/
          Copy-Item -Recurse bin release/JhopanStoreVPN-windows/
          New-Item -ItemType Directory -Force -Path release/JhopanStoreVPN-windows/assets
          Copy-Item assets/background.png release/JhopanStoreVPN-windows/assets/
          Copy-Item assets/icon64.png release/JhopanStoreVPN-windows/assets/
          Copy-Item assets/icon256.png release/JhopanStoreVPN-windows/assets/
          Compress-Archive -Path release/JhopanStoreVPN-windows -DestinationPath release/JhopanStoreVPN-windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-windows
          path: release/JhopanStoreVPN-windows.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/JhopanStoreVPN-windows.zip
          fail_on_unmatched_files: false

  build-linux:
    needs: changes
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_linux == true) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.desktop == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev

      - name: Download Xray-core
        run: |
          curl -L -o xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
          unzip -o xray.zip -d xray-tmp
          find xray-tmp -name "xray" -not -name "*.dat" -exec cp {} ./xray \;
          chmod +x xray

      - name: Download tun2socks binary
        run: |
          curl -L -o tun2socks.zip "https://github.com/xjasonlyu/tun2socks/releases/download/v2.5.2/tun2socks-linux-amd64.zip"
          unzip -o tun2socks.zip -d tun2socks-tmp
          mkdir -p bin
          find tun2socks-tmp -type f ! -name "*.zip" | head -1 | xargs -I{} cp {} bin/tun2socks
          chmod +x bin/tun2socks

      - name: Build
        run: |
          CGO_ENABLED=1 go build -v -ldflags="-s -w" -o JhopanStoreVPN .

      - name: Package
        run: |
          mkdir -p release/JhopanStoreVPN-linux/assets
          cp JhopanStoreVPN release/JhopanStoreVPN-linux/
          cp xray release/JhopanStoreVPN-linux/
          cp -r bin release/JhopanStoreVPN-linux/
          chmod +x release/JhopanStoreVPN-linux/bin/tun2socks
          cp assets/background.png release/JhopanStoreVPN-linux/assets/
          cp assets/icon64.png release/JhopanStoreVPN-linux/assets/
          cp assets/icon256.png release/JhopanStoreVPN-linux/assets/
          chmod +x release/JhopanStoreVPN-linux/JhopanStoreVPN
          chmod +x release/JhopanStoreVPN-linux/xray

          # Create launcher script (detaches from terminal)
          cat > release/JhopanStoreVPN-linux/launch.sh << 'LAUNCHER'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$DIR"
          nohup ./JhopanStoreVPN > /dev/null 2>&1 &
          disown
          LAUNCHER
          sed -i 's/^          //' release/JhopanStoreVPN-linux/launch.sh
          chmod +x release/JhopanStoreVPN-linux/launch.sh

          # Create .desktop file
          cat > release/JhopanStoreVPN-linux/JhopanStoreVPN.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=JhopanStoreVPN
          Comment=Lightweight VLESS VPN Client
          Exec=bash -c 'cd "$(dirname "%k")" && nohup ./JhopanStoreVPN > /dev/null 2>&1 &'
          Icon=assets/icon256.png
          Terminal=false
          Type=Application
          Categories=Network;VPN;
          DESKTOP
          sed -i 's/^          //' release/JhopanStoreVPN-linux/JhopanStoreVPN.desktop
          chmod +x release/JhopanStoreVPN-linux/JhopanStoreVPN.desktop

          cd release && tar czf JhopanStoreVPN-linux.tar.gz JhopanStoreVPN-linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-linux
          path: release/JhopanStoreVPN-linux.tar.gz

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/JhopanStoreVPN-linux.tar.gz
          fail_on_unmatched_files: false

  build-macos:
    needs: changes
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_macos == true) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.desktop == 'true')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install macOS dependencies
        run: |
          # Ensure Xcode command line tools are available
          xcode-select --install 2>/dev/null || echo "Xcode tools already installed"

      - name: Download tun2socks binary (universal arm64+amd64)
        run: |
          # arm64 — Apple Silicon (M1/M2/M3)
          curl -L -o tun2socks-arm64.zip "https://github.com/xjasonlyu/tun2socks/releases/download/v2.5.2/tun2socks-darwin-arm64.zip"
          unzip -o tun2socks-arm64.zip -d tun2socks-arm64-tmp
          ARM64=$(find tun2socks-arm64-tmp -type f ! -name "*.zip" | head -1)
          # amd64 — Intel Mac
          curl -L -o tun2socks-amd64.zip "https://github.com/xjasonlyu/tun2socks/releases/download/v2.5.2/tun2socks-darwin-amd64.zip"
          unzip -o tun2socks-amd64.zip -d tun2socks-amd64-tmp
          AMD64=$(find tun2socks-amd64-tmp -type f ! -name "*.zip" | head -1)
          mkdir -p bin
          lipo -create "$ARM64" "$AMD64" -output bin/tun2socks
          chmod +x bin/tun2socks
          echo "tun2socks archs: $(lipo -archs bin/tun2socks)"

      - name: Download Xray-core (universal arm64+amd64)
        run: |
          # arm64 — Apple Silicon (M1/M2/M3)
          curl -L -o xray-arm64.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-macos-arm64-v8a.zip"
          unzip -o xray-arm64.zip -d xray-arm64-tmp
          ARM64=$(find xray-arm64-tmp -name "xray" ! -name "*.dat" | head -1)
          # amd64 — Intel Mac
          curl -L -o xray-amd64.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-macos-64.zip"
          unzip -o xray-amd64.zip -d xray-amd64-tmp
          AMD64=$(find xray-amd64-tmp -name "xray" ! -name "*.dat" | head -1)
          lipo -create "$ARM64" "$AMD64" -output xray
          chmod +x xray
          echo "xray archs: $(lipo -archs xray)"

      - name: Build
        run: |
          # Clean up any Windows-specific build artifacts
          rm -f resource.syso *.syso
          # Verify cleanup
          echo "=== Cleaned build directory ==="
          ls -la | grep -E '\.syso$' || echo "No .syso files found (good)"
          # Build for macOS
          CGO_ENABLED=1 go build -v -ldflags="-s -w" -o JhopanStoreVPN .

      - name: Package
        run: |
          # Create macOS .app bundle
          APP="release/JhopanStoreVPN.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/MacOS/bin"
          mkdir -p "$APP/Contents/Resources/assets"

          cp JhopanStoreVPN "$APP/Contents/MacOS/"
          cp xray "$APP/Contents/MacOS/"
          cp -r bin "$APP/Contents/MacOS/"
          cp assets/background.png "$APP/Contents/Resources/assets/"
          cp assets/icon64.png "$APP/Contents/Resources/assets/"
          cp assets/icon256.png "$APP/Contents/Resources/assets/"
          chmod +x "$APP/Contents/MacOS/JhopanStoreVPN"
          chmod +x "$APP/Contents/MacOS/xray"
          chmod +x "$APP/Contents/MacOS/bin/tun2socks"

          # Create Info.plist
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>JhopanStoreVPN</string>
            <key>CFBundleIdentifier</key>
            <string>com.jhopanstorevpn.app</string>
            <key>CFBundleName</key>
            <string>JhopanStoreVPN</string>
            <key>CFBundleDisplayName</key>
            <string>JhopanStoreVPN</string>
            <key>CFBundleVersion</key>
            <string>2.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>2.1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          sed -i '' 's/^          //' "$APP/Contents/Info.plist"

          cd release && tar czf JhopanStoreVPN-macos.tar.gz JhopanStoreVPN.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-macos
          path: release/JhopanStoreVPN-macos.tar.gz

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/JhopanStoreVPN-macos.tar.gz
          fail_on_unmatched_files: false

  build-android:
    needs: changes
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_android == true) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.android == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Go (required to build libXray.aar via gomobile)
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: false

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Cache libXray.aar
        id: cache-libxray
        uses: actions/cache@v4
        with:
          path: android/app/libs/libXray.aar
          key: libxray-android-main-${{ runner.os }}

      - name: Build libXray.aar from source (gomobile)
        if: steps.cache-libxray.outputs.cache-hit != 'true'
        run: |
          mkdir -p android/app/libs
          export GOPATH=$(go env GOPATH)
          export PATH=$PATH:$GOPATH/bin

          # Install gomobile system-wide
          go install golang.org/x/mobile/cmd/gomobile@latest

          # Clone libXray wrapper source and Xray-core (main = fixed gvisor Go1.26)
          git clone --depth 1 https://github.com/XTLS/libXray /tmp/libxray-src
          git clone --depth 1 https://github.com/XTLS/Xray-core /tmp/Xray-core-libXray

          cd /tmp/libxray-src

          # Step 1: init_go_env (mirrors XTLS build.py)
          rm -f go.mod go.sum
          go mod init github.com/xtls/libxray
          go mod edit -replace github.com/xtls/xray-core=../Xray-core-libXray
          go mod tidy

          # Step 2: prepare_gomobile (mirrors XTLS build.py)
          # MUST be AFTER go mod tidy — tidy would remove x/mobile if added before
          go get golang.org/x/mobile/cmd/gomobile@latest
          go get google.golang.org/genproto@latest

          # Init gomobile Android toolchain
          gomobile init

          # Build AAR (-trimpath removes embedded build paths from the binary)
          GOFLAGS=-trimpath gomobile bind -target android -androidapi 21 -o libXray.aar .

          if [ ! -f libXray.aar ]; then
            echo "✗ Build failed — libXray.aar not found"
            ls -la
            exit 1
          fi

          cp libXray.aar "$GITHUB_WORKSPACE/android/app/libs/libXray.aar"
          echo "✓ libXray.aar: $(du -sh "$GITHUB_WORKSPACE/android/app/libs/libXray.aar" | cut -f1)"

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload libXray.aar artifact (for local development)
        uses: actions/upload-artifact@v4
        with:
          name: libXray-aar
          path: android/app/libs/libXray.aar
          retention-days: 30

      - name: Collect and rename APKs
        run: |
          mkdir -p apks
          VERSION=$(grep -oP 'versionName = "\K[^"]+' android/app/build.gradle.kts | head -1)
          echo "Version: $VERSION"

          # Collect each per-ABI split APK
          for ABI in arm64-v8a armeabi-v7a x86_64 x86; do
            SRC=$(find android/app/build/outputs/apk/release -name "app-${ABI}-release.apk" 2>/dev/null | head -1)
            if [ -n "$SRC" ]; then
              DEST="apks/JhopanStoreVPN-${VERSION}-${ABI}.apk"
              cp "$SRC" "$DEST"
              echo "  ✓ $DEST ($(du -sh "$DEST" | cut -f1))"
            else
              echo "  ✗ app-${ABI}-release.apk not found"
            fi
          done
          # Universal APK — all ABIs bundled (max compatibility, largest file)
          UNIV=$(find android/app/build/outputs/apk/release -name "app-universal-release.apk" 2>/dev/null | head -1)
          if [ -n "$UNIV" ]; then
            DEST="apks/JhopanStoreVPN-${VERSION}-universal.apk"
            cp "$UNIV" "$DEST"
            echo "  ✓ $DEST ($(du -sh "$DEST" | cut -f1))"
          else
            echo "  ✗ app-universal-release.apk not found"
          fi
          ls -lh apks/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-android-apks
          path: apks/*.apk

      - name: Upload APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apks/*.apk
          fail_on_unmatched_files: false

  release:
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    # Jalankan selalu saat tag push — rilis apa pun yang berhasil, skip yang gagal tidak masalah
    if: always() && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Create / update GitHub Release with release notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
