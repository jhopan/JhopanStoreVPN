name: Build JhopanStoreVPN

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_windows:
        description: "Build Windows"
        type: boolean
        default: true
      build_linux:
        description: "Build Linux"
        type: boolean
        default: true
      build_macos:
        description: "Build macOS"
        type: boolean
        default: true
      build_android:
        description: "Build Android APK"
        type: boolean
        default: true

jobs:
  # Deteksi file apa yang berubah sejak commit/tag sebelumnya
  changes:
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tentukan base ref untuk perbandingan
        id: base
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tag push: bandingkan terhadap tag sebelumnya
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
            if [ -z "$PREV_TAG" ]; then
              echo "base=HEAD~1" >> $GITHUB_OUTPUT
            else
              echo "base=$PREV_TAG" >> $GITHUB_OUTPUT
            fi
          else
            echo "base=HEAD~1" >> $GITHUB_OUTPUT
          fi

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.base.outputs.base }}
          filters: |
            desktop:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'assets/**'
              - '.github/workflows/build.yml'
            android:
              - 'android/**'
              - '.github/workflows/build.yml'

  build-windows:
    needs: changes
    # Tag push → cek path | manual dispatch → ikut checkbox
    if: |
      (startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.desktop == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_windows == true) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.desktop == 'true')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download Xray-core
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-windows-64.zip" -OutFile xray.zip
          Expand-Archive xray.zip -DestinationPath xray-tmp -Force
          $xrayExe = Get-ChildItem -Recurse xray-tmp -Filter "xray.exe" | Select-Object -First 1
          Copy-Item $xrayExe.FullName ./xray.exe

      - name: Download tun2socks binary
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/xjasonlyu/tun2socks/releases/download/v2.5.2/tun2socks-windows-amd64.zip" -OutFile tun2socks.zip
          Expand-Archive tun2socks.zip -DestinationPath tun2socks-tmp -Force
          New-Item -ItemType Directory -Force -Path bin
          Copy-Item tun2socks-tmp/tun2socks-windows-amd64.exe bin/tun2socks.exe

      - name: Build
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "1"
          go build -v -ldflags="-s -w -H windowsgui" -o JhopanStoreVPN.exe .

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/JhopanStoreVPN-windows
          Copy-Item JhopanStoreVPN.exe release/JhopanStoreVPN-windows/
          Copy-Item xray.exe release/JhopanStoreVPN-windows/
          Copy-Item -Recurse bin release/JhopanStoreVPN-windows/
          New-Item -ItemType Directory -Force -Path release/JhopanStoreVPN-windows/assets
          Copy-Item assets/background.png release/JhopanStoreVPN-windows/assets/
          Copy-Item assets/icon64.png release/JhopanStoreVPN-windows/assets/
          Copy-Item assets/icon256.png release/JhopanStoreVPN-windows/assets/
          
          # Create README
          @"
JhopanStoreVPN v2.0.0 - TUN Mode (Windows)
==========================================

REQUIREMENTS:
- Windows 10/11 (64-bit)
- Administrator privileges (REQUIRED for TUN mode)

INSTALLATION:
Extract all files and keep folder structure intact:
  JhopanStoreVPN.exe
  xray.exe
  bin/
    tun2socks.exe
  assets/
    (icon files)

USAGE:
1. Right-click JhopanStoreVPN.exe
2. Select "Run as Administrator"
3. Enter VLESS server details or paste vless:// link
4. Click CONNECT

FEATURES:
- TUN mode - System-wide VPN (ALL apps work)
- No manual proxy configuration needed
- Works with: WhatsApp, Telegram, Discord, games, etc.
- Auto-reconnect on disconnect
- Real-time latency monitoring

NOTE: Windows may ask to install Wintun driver on first run - click Yes.
"@ | Out-File -FilePath release/JhopanStoreVPN-windows/README.txt -Encoding UTF8
          
          Compress-Archive -Path release/JhopanStoreVPN-windows -DestinationPath release/JhopanStoreVPN-windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-windows
          path: release/JhopanStoreVPN-windows.zip

  build-linux:
    needs: changes
    if: |
      (startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.desktop == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_linux == true) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.desktop == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev

      - name: Download Xray-core
        run: |
          curl -L -o xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
          unzip -o xray.zip -d xray-tmp
          find xray-tmp -name "xray" -not -name "*.dat" -exec cp {} ./xray \;
          chmod +x xray

      - name: Build
        run: |
          CGO_ENABLED=1 go build -v -ldflags="-s -w" -o JhopanStoreVPN .

      - name: Package
        run: |
          mkdir -p release/JhopanStoreVPN-linux/assets
          cp JhopanStoreVPN release/JhopanStoreVPN-linux/
          cp xray release/JhopanStoreVPN-linux/
          cp assets/background.png release/JhopanStoreVPN-linux/assets/
          cp assets/icon64.png release/JhopanStoreVPN-linux/assets/
          cp assets/icon256.png release/JhopanStoreVPN-linux/assets/
          chmod +x release/JhopanStoreVPN-linux/JhopanStoreVPN
          chmod +x release/JhopanStoreVPN-linux/xray

          # Create launcher script (detaches from terminal)
          cat > release/JhopanStoreVPN-linux/launch.sh << 'LAUNCHER'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$DIR"
          nohup ./JhopanStoreVPN > /dev/null 2>&1 &
          disown
          LAUNCHER
          sed -i 's/^          //' release/JhopanStoreVPN-linux/launch.sh
          chmod +x release/JhopanStoreVPN-linux/launch.sh

          # Create .desktop file
          cat > release/JhopanStoreVPN-linux/JhopanStoreVPN.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=JhopanStoreVPN
          Comment=Lightweight VLESS VPN Client
          Exec=bash -c 'cd "$(dirname "%k")" && nohup ./JhopanStoreVPN > /dev/null 2>&1 &'
          Icon=assets/icon256.png
          Terminal=false
          Type=Application
          Categories=Network;VPN;
          DESKTOP
          sed -i 's/^          //' release/JhopanStoreVPN-linux/JhopanStoreVPN.desktop
          chmod +x release/JhopanStoreVPN-linux/JhopanStoreVPN.desktop

          cd release && tar czf JhopanStoreVPN-linux.tar.gz JhopanStoreVPN-linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-linux
          path: release/JhopanStoreVPN-linux.tar.gz

  build-macos:
    needs: changes
    if: |
      (startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.desktop == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_macos == true) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.desktop == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download Xray-core
        run: |
          curl -L -o xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-macos-arm64-v8a.zip"
          unzip -o xray.zip -d xray-tmp
          find xray-tmp -name "xray" -not -name "*.dat" -exec cp {} ./xray \;
          chmod +x xray

      - name: Build
        run: |
          CGO_ENABLED=1 go build -v -ldflags="-s -w" -o JhopanStoreVPN .

      - name: Package
        run: |
          # Create macOS .app bundle
          APP="release/JhopanStoreVPN.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources/assets"

          cp JhopanStoreVPN "$APP/Contents/MacOS/"
          cp xray "$APP/Contents/MacOS/"
          cp assets/background.png "$APP/Contents/Resources/assets/"
          cp assets/icon64.png "$APP/Contents/Resources/assets/"
          cp assets/icon256.png "$APP/Contents/Resources/assets/"
          chmod +x "$APP/Contents/MacOS/JhopanStoreVPN"
          chmod +x "$APP/Contents/MacOS/xray"

          # Create Info.plist
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>JhopanStoreVPN</string>
            <key>CFBundleIdentifier</key>
            <string>com.jhopanstorevpn.app</string>
            <key>CFBundleName</key>
            <string>JhopanStoreVPN</string>
            <key>CFBundleDisplayName</key>
            <string>JhopanStoreVPN</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          sed -i '' 's/^          //' "$APP/Contents/Info.plist"

          cd release && tar czf JhopanStoreVPN-macos.tar.gz JhopanStoreVPN.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-macos
          path: release/JhopanStoreVPN-macos.tar.gz

  build-android:
    needs: changes
    if: |
      (startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.android == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_android == true) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.android == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Go (required to build libXray.aar via gomobile)
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: false

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Cache libXray.aar
        id: cache-libxray
        uses: actions/cache@v4
        with:
          path: android/app/libs/libXray.aar
          key: libxray-android-main-${{ runner.os }}

      - name: Build libXray.aar from source (gomobile)
        if: steps.cache-libxray.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973
        run: |
          mkdir -p android/app/libs
          export GOPATH=$(go env GOPATH)
          export PATH=$PATH:$GOPATH/bin

          # Install gomobile system-wide
          go install golang.org/x/mobile/cmd/gomobile@latest

          # Clone libXray wrapper source and Xray-core (main = fixed gvisor Go1.26)
          git clone --depth 1 https://github.com/XTLS/libXray /tmp/libxray-src
          git clone --depth 1 https://github.com/XTLS/Xray-core /tmp/Xray-core-libXray

          cd /tmp/libxray-src

          # Step 1: init_go_env (mirrors XTLS build.py)
          rm -f go.mod go.sum
          go mod init github.com/xtls/libxray
          go mod edit -replace github.com/xtls/xray-core=../Xray-core-libXray
          go mod tidy

          # Step 2: prepare_gomobile (mirrors XTLS build.py)
          # MUST be AFTER go mod tidy — tidy would remove x/mobile if added before
          go get golang.org/x/mobile/cmd/gomobile@latest
          go get google.golang.org/genproto@latest

          # Init gomobile Android toolchain
          gomobile init

          # Build AAR
          gomobile bind -target android -androidapi 21 -o libXray.aar .

          if [ ! -f libXray.aar ]; then
            echo "✗ Build failed — libXray.aar not found"
            ls -la
            exit 1
          fi

          cp libXray.aar "$GITHUB_WORKSPACE/android/app/libs/libXray.aar"
          echo "✓ libXray.aar: $(du -sh "$GITHUB_WORKSPACE/android/app/libs/libXray.aar" | cut -f1)"

      - name: Build APK
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload libXray.aar artifact (for local development)
        uses: actions/upload-artifact@v4
        with:
          name: libXray-aar
          path: android/app/libs/libXray.aar
          retention-days: 30

      - name: Collect APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" JhopanStoreVPN-android.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-android
          path: JhopanStoreVPN-android.apk

  release:
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    # Jalankan jika push tag dan tidak ada job yang failure (job yang di-skip = OK)
    if: always() && startsWith(github.ref, 'refs/tags/') && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: JhopanStoreVPN-windows
          path: artifacts/JhopanStoreVPN-windows
        continue-on-error: true

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: JhopanStoreVPN-linux
          path: artifacts/JhopanStoreVPN-linux
        continue-on-error: true

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: JhopanStoreVPN-macos
          path: artifacts/JhopanStoreVPN-macos
        continue-on-error: true

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: JhopanStoreVPN-android
          path: artifacts/JhopanStoreVPN-android
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/JhopanStoreVPN-windows/*.zip
            artifacts/JhopanStoreVPN-linux/*.tar.gz
            artifacts/JhopanStoreVPN-macos/*.tar.gz
            artifacts/JhopanStoreVPN-android/*.apk
          generate_release_notes: true
